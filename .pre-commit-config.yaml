repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      # Pre-commit: auto-format and stage (frictionless)
      - id: quality-gates-pre-commit
        name: quality-gates-pre-commit
        entry: uv run python scripts/quality_gate.py --with-format-check --auto-format
        language: system
        pass_filenames: false
        stages: [pre-commit]
      # Pre-push: check-only (fails fast if formatting needed)
      - id: quality-gates-pre-push
        name: quality-gates-pre-push
        entry: uv run python scripts/quality_gate.py --with-format-check
        language: system
        pass_filenames: false
        stages: [pre-push]
